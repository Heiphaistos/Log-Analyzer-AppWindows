name: CI

# Build + tests uniquement : aucun secret requis.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/WinLogAnalyzer.Core/WinLogAnalyzer.Core.csproj

      - name: Build Core
        run: dotnet build src/WinLogAnalyzer.Core/WinLogAnalyzer.Core.csproj -c Release --no-restore

      - name: Build App
        run: dotnet build src/WinLogAnalyzer.App/WinLogAnalyzer.App.csproj -c Release

      - name: Test
        run: dotnet test tests/WinLogAnalyzer.Tests/WinLogAnalyzer.Tests.csproj -c Release --logger "console;verbosity=normal"
